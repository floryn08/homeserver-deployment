namespace: media-management

backup:
  enabled: true
  resticImage: restic/restic:0.19.0
  rcloneImage: rclone/rclone:1.74.3

host:
  subdomain: immich

secrets:
  primaryDomain:
    key: primaryDomain
    path: kv/data/domains
  homeDomain:
    key: homeDomain
    path: kv/data/domains

middleware:
  buffering:
    maxRequestBodyBytes: 0
    memRequestBodyBytes: 2147483648
    maxResponseBodyBytes: 0
    memResponseBodyBytes: 2147483648

storage:
  appdataBasePath: /srv/appdata
  immichDataPath: /mnt/hdd2/immich/library
  immichPostgresDataPath: /srv/appdata/media-management/immich/postgres

# https://github.com/immich-app/immich-charts/blob/main/charts/immich/values.yaml
immich:

  immich:
    persistence:
      library:
        existingClaim: "immich-data-pvc"

  valkey:
    enabled: true

  server:
    persistence:
      external:
        enabled: true
        type: hostPath
        hostPath: /mnt/hdd2/GooglePhotosExport

    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.5
            env:
              REDIS_HOSTNAME: '{{ printf "%s-valkey" .Release.Name }}'
              IMMICH_MACHINE_LEARNING_URL: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'
              DB_HOSTNAME: "{{ .Release.Name }}-postgresql"
              DB_USERNAME: immich
              DB_DATABASE_NAME: immich

            # for DB_PASSWORD
            envFrom:
              - secretRef:
                  name: immich
            probes:
              startup:
                spec:
                  failureThreshold: 360
    


  machine-learning:
    controllers:
      main:
        containers:
          main:
            image:  
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v2.7.5

postgresql:
  image:
    repository: ghcr.io/immich-app/postgres
    tag: 18-vectorchord0.5.3-pgvector0.8.1
    pullPolicy: IfNotPresent
  auth:
    username: immich
    database: immich
    existingSecret: immich
    passwordKey: postgres-user-password
  persistence:
    existingClaim: immich-postgres-data-pvc
    # Keep the old Bitnami data/ directory untouched for rollback.
    dataDirectory: /var/lib/postgresql/18/docker
  resources:
    requests:
      cpu: "1"
      ephemeral-storage: 50Mi
      memory: 2Gi
    limits:
      cpu: 1500m
      ephemeral-storage: 2Gi
      memory: 3Gi
