apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
      - name: {{ .Release.Name }}
        image: {{ .Values.image }}
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: {{ .Release.Name }}-config
        env:
        - name: AUTOBRR__OIDC_ISSUER
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-vault
              key: AUTOBRR__OIDC_ISSUER
        - name: AUTOBRR__OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-vault
              key: AUTOBRR__OIDC_CLIENT_ID
        - name: AUTOBRR__OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-vault
              key: AUTOBRR__OIDC_CLIENT_SECRET
        - name: AUTOBRR__OIDC_REDIRECT_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-vault
              key: AUTOBRR__OIDC_REDIRECT_URL
        ports:
        {{- range .Values.service.ports }}
        - name: {{ .name }}
          containerPort: {{ .containerPort }}
          protocol: {{ .protocol }}
        {{- end }}
        volumeMounts:
        {{- range .Values.storage.volumes }}
        - name: {{ .name }}
          mountPath: {{ .podPath }}
          readOnly: {{ .readOnly }}
        {{- end }}
        {{- if .Values.resources }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        {{- end }}
      volumes:
      {{- range .Values.storage.volumes }}
      - name: {{ .name }}
        persistentVolumeClaim:
          claimName: {{ $.Release.Name }}-{{ .name }}-pvc
      {{- end }}
