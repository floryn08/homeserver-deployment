image: ghcr.io/dictionarry-hub/profilarr:2.0.9
namespace: media-management
origin: https://profilarr.home

host:
  subdomain: profilarr

secrets:
  domain:
    key: homeDomain
    path: kv/data/domains

storage:
  appdataBasePath: /srv/appdata/media-management/profilarr
  volumes:
  - name: config
    subPath: config
    podPath: /config
    type: DirectoryOrCreate
    readOnly: false

service:
  type: ClusterIP
  ports:
  - name: http
    containerPort: 6868
    externalPort: 6868
    protocol: TCP
