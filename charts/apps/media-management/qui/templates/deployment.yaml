apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
  replicas: 1
  revisionHistoryLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        reloader.stakater.com/auto: "true"
    spec:
      volumes:
      - name: {{ .Release.Name }}
        persistentVolumeClaim:
          claimName: {{ .Release.Name }}
      - name: media
        hostPath:
          path: /mnt/hdd
          type: Directory
      - name: hdd12tb
        hostPath:
          path: /mnt/hdd12tb
          type: Directory
      containers:
      - name: {{ .Release.Name }}
        image: {{ .Values.image }}
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: {{ .Release.Name }}
        env:
        - name: QUI__OIDC_ISSUER
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-vault
              key: QUI__OIDC_ISSUER
        - name: QUI__OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-vault
              key: QUI__OIDC_CLIENT_ID
        - name: QUI__OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-vault
              key: QUI__OIDC_CLIENT_SECRET
        - name: QUI__OIDC_REDIRECT_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-vault
              key: QUI__OIDC_REDIRECT_URL
        ports:
        {{- range $key, $val := $.Values.service.ports }}
        - containerPort: {{ $val.containerPort }}
          name: {{ $val.name }}
          protocol: {{ $val.protocol }}
        {{ end -}}
        volumeMounts:
        {{- range $index, $val := $.Values.storage.volumes }}
        - mountPath: {{ $val.podPath }}
          name: {{ $.Release.Name }}
          subPath: {{ $val.subPath }}
        {{ end -}}
        - mountPath: /media
          name: media
          readOnly: false
        - mountPath: /hdd12tb
          name: hdd12tb
          readOnly: false
        {{- if .Values.resources }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        {{- end }}
