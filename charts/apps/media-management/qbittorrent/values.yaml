image: lscr.io/linuxserver/qbittorrent:5.2.3
namespace: media-management

host:
  subdomain: qbittorrent

secrets:
  domain:
    key: homeDomain
    path: kv/data/domains

storage:
  appdataBasePath: /srv/appdata/media-management/qbittorrent
  volumes:
  - name: config
    subPath: config
    podPath: /config
    type: DirectoryOrCreate
    readOnly: false

service:
  type: ClusterIP
  ports:
  - name: http
    containerPort: 8383
    externalPort: 8383
    protocol: TCP

peerService:
  type: LoadBalancer
  ports:
  - name: tcp
    containerPort: 57972
    externalPort: 57972
    protocol: TCP
  - name: udp
    containerPort: 57972
    externalPort: 57972
    protocol: UDP
