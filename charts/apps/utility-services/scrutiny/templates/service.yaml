apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
  {{- range $key, $val := $.Values.service.ports }}
  - port: {{ $val.externalPort }}
    targetPort: {{ $val.name }}
    name: {{ $val.name }}
    protocol: {{ $val.protocol }}
  {{- end }}
  selector:
    app.kubernetes.io/name: {{ .Release.Name }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-collector
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort
  ports:
  - port: 8080
    targetPort: http
    nodePort: {{ .Values.collectorService.nodePort }}
    protocol: TCP
  selector:
    app.kubernetes.io/name: {{ .Release.Name }}
