kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ .Release.Name }}-helm-install
  namespace: {{ .Values.namespace }}
data:
  10-install-helm: |
    #!/usr/bin/with-contenv bash
    set -euo pipefail

    if command -v helm >/dev/null 2>&1; then
      exit 0
    fi

    HELM_BUILDKITE_APT_KEY_ID="DDF78C3E6EBB2D2CC223C95C62BA89D07698DBC6"
    HELM_GPG_FILE="${TMPDIR:-/tmp}/helm.gpg"

    curl -fsSL https://packages.buildkite.com/helm-linux/helm-debian/gpgkey > "${HELM_GPG_FILE}"

    if [ "$(gpg --show-keys --with-colons "${HELM_GPG_FILE}" | awk -F: '$1 == "fpr" {print $10}' | head -n 1)" != "${HELM_BUILDKITE_APT_KEY_ID}" ]; then
      echo "ERROR: unexpected Helm APT key ID"
      exit 1
    fi

    cat "${HELM_GPG_FILE}" | gpg --dearmor > /usr/share/keyrings/helm.gpg
    echo "deb [signed-by=/usr/share/keyrings/helm.gpg] https://packages.buildkite.com/helm-linux/helm-debian/any/ any main" > /etc/apt/sources.list.d/helm-stable-debian.list

    apt-get update
    apt-get install -y --no-install-recommends helm
    rm -rf /var/lib/apt/lists/*
