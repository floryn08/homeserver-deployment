kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ .Release.Name }}-install-scripts
  namespace: {{ .Values.namespace }}
data:
  05-enable-bwrap-sandbox: |
    #!/usr/bin/with-contenv bash
    set -euo pipefail
    found_bwrap=false
    for bwrap_path in $(command -v bwrap || true) $(command -v bubblewrap || true) $(find /config/extensions -path "*/codex-resources/bwrap" -type f 2>/dev/null); do
      found_bwrap=true
      setcap cap_sys_admin+ep "${bwrap_path}"
      getcap "${bwrap_path}" || true
    done

    if [ "${found_bwrap}" = "false" ]; then
      echo "WARN: bwrap not found; Codex sandbox may still be unavailable" >&2
    fi
  10-install-helm: |
    #!/usr/bin/with-contenv bash
    set -euo pipefail

    if command -v helm >/dev/null 2>&1; then
      exit 0
    fi

    HELM_BUILDKITE_APT_KEY_ID="DDF78C3E6EBB2D2CC223C95C62BA89D07698DBC6"
    HELM_GPG_FILE="${TMPDIR:-/tmp}/helm.gpg"

    curl -fsSL https://packages.buildkite.com/helm-linux/helm-debian/gpgkey > "${HELM_GPG_FILE}"

    if [ "$(gpg --show-keys --with-colons "${HELM_GPG_FILE}" | awk -F: '$1 == "fpr" {print $10}' | head -n 1)" != "${HELM_BUILDKITE_APT_KEY_ID}" ]; then
      echo "ERROR: unexpected Helm APT key ID"
      exit 1
    fi

    cat "${HELM_GPG_FILE}" | gpg --dearmor > /usr/share/keyrings/helm.gpg
    echo "deb [signed-by=/usr/share/keyrings/helm.gpg] https://packages.buildkite.com/helm-linux/helm-debian/any/ any main" > /etc/apt/sources.list.d/helm-stable-debian.list

    apt-get update
    apt-get install -y --no-install-recommends helm
    rm -rf /var/lib/apt/lists/*
  20-install-kubectl: |
    #!/usr/bin/with-contenv bash
    set -euo pipefail

    if command -v kubectl >/dev/null 2>&1; then
      exit 0
    fi

    arch="$(uname -m)"
    case "${arch}" in
      x86_64) kubectl_arch="amd64" ;;
      aarch64|arm64) kubectl_arch="arm64" ;;
      *) echo "Unsupported architecture: ${arch}" >&2; exit 1 ;;
    esac

    kubectl_version="${KUBECTL_VERSION:-cluster}"
    if [ "${kubectl_version}" = "cluster" ]; then
      service_account_dir="/var/run/secrets/kubernetes.io/serviceaccount"
      kubectl_version="$(curl -fsS --cacert "${service_account_dir}/ca.crt" --header "Authorization: Bearer $(cat "${service_account_dir}/token")" "https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}/version" | sed -n 's/.*"gitVersion"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | sed 's/+.*//')"
      if [ -z "${kubectl_version}" ]; then
        echo "WARN: unable to determine cluster kubectl version; falling back to stable" >&2
        kubectl_version="$(curl -fsSL https://dl.k8s.io/release/stable.txt)"
      fi
    elif [ "${kubectl_version}" = "stable" ]; then
      kubectl_version="$(curl -fsSL https://dl.k8s.io/release/stable.txt)"
    fi

    if [ -z "${kubectl_version}" ]; then
      echo "ERROR: unable to determine kubectl version" >&2
      exit 1
    fi

    curl -fsSLo /usr/local/bin/kubectl "https://dl.k8s.io/release/${kubectl_version}/bin/linux/${kubectl_arch}/kubectl"
    chmod 0755 /usr/local/bin/kubectl
    kubectl version --client=true
