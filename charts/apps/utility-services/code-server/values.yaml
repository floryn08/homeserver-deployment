image: lscr.io/linuxserver/code-server:4.122.0
namespace: utility-services

env:
  PUID: "1000"
  PGID: "1000"
  TZ: Europe/Bucharest
  DEFAULT_WORKSPACE: /config/workspace
  NODEJS_MOD_VERSION: "24"
  EXTENSIONS_GALLERY: |
    {"serviceUrl":"https://marketplace.visualstudio.com/_apis/public/gallery","itemUrl":"https://marketplace.visualstudio.com/items"}
  DOCKER_MODS: linuxserver/mods:code-server-nodejs|linuxserver/mods:code-server-npmglobal|linuxserver/mods:code-server-golang|linuxserver/mods:code-server-python3|linuxserver/mods:universal-package-install
  INSTALL_PACKAGES: ca-certificates|git|openssh-client|apt-transport-https|gpg|build-essential|pkg-config|make|gcc|g++|curl|wget|unzip|tar|jq|ripgrep|shellcheck

host:
  subdomain: code

secrets:
  domain:
    key: primaryDomain
    path: kv/data/domains

storage:
  appdataBasePath: /srv/appdata/utility-services/code-server
  volumes:
  - name: config
    subPath: config
    podPath: /config
    type: DirectoryOrCreate

service:
  type: ClusterIP
  ports:
  - name: http
    containerPort: 8443
    externalPort: 8443
    protocol: TCP

probes:
  path: /healthz
  port: http
  startup:
    failureThreshold: 60
    periodSeconds: 10
    timeoutSeconds: 5
  readiness:
    failureThreshold: 5
    periodSeconds: 10
    timeoutSeconds: 5
  liveness:
    failureThreshold: 5
    periodSeconds: 10
    timeoutSeconds: 5
