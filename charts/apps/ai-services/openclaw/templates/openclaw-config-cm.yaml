kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Values.namespace }}
data:
  openclaw.json: |
    {
      "agents": {
        "defaults": {
          "workspace": "/home/node/.openclaw/workspace",
          "model": {
            "primary": {{ .Values.ollama.model | quote }}
          },
          "models": {
            {{ .Values.ollama.model | quote }}: { "alias": "ollama" }
          }
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "ollama": {
            "baseUrl": {{ printf "%s/v1" .Values.ollama.host | quote }},
            "api": "openai-completions",
            "key": "ollama",
            "models": [
              {
                "id": {{ .Values.ollama.model | trimPrefix "ollama/" | quote }},
                "name": {{ .Values.ollama.model | trimPrefix "ollama/" | quote }},
                "input": ["text"],
                "contextWindow": 32768,
                "maxTokens": 8192
              }
            ]
          }
        }
      },
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "auth": {
          "token": "${OPENCLAW_GATEWAY_TOKEN}"
        },
        "trustedProxies": ["10.42.0.0/16"],
        "controlUi": {
          "allowedOrigins": [
            "http://localhost:18789",
            "http://127.0.0.1:18789",
            {{ .Values.host.url | quote }}
          ]
        }
      }
    }
