# https://github.com/crowdsecurity/helm-charts/blob/main/charts/crowdsec/values.yaml

crowdsec:
  container_runtime: containerd
  image:
    repository: crowdsecurity/crowdsec
    tag: v1.7.8
  agent:
    # Specify each pod whose logs you want to process
    acquisition:
      # The namespace where the pod is located
      - namespace: core-services
        # The pod name
        podName: traefik-*
        # as in crowdsec configuration, we need to specify the program name to find a matching parser
        program: traefik
      - namespace: core-services
        # The pod name
        podName: authentik-server*
        # as in crowdsec configuration, we need to specify the program name to find a matching parser
        program: authentik
    env:
      - name: COLLECTIONS
        value: "crowdsecurity/traefik firix/authentik crowdsecurity/plex"
      - name: CROWDSEC_BYPASS_DB_VOLUME_CHECK
        value: "true"
  lapi:
    env:
      # postgres config
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: crowdsec
            key: DB_PASSWORD

      - name: CROWDSEC_WEB_UI_PASSWORD
        valueFrom:
          secretKeyRef:
            name: crowdsec
            key: CROWDSEC_WEB_UI_PASSWORD

      # To enroll the Security Engine to the console
      - name: ENROLL_KEY
        valueFrom:
          secretKeyRef:
            name: crowdsec
            key: ENROLL_KEY
      - name: ENROLL_INSTANCE_NAME
        value: "homeserver"
      - name: ENROLL_TAGS
        value: "k8s linux"
      - name: BOUNCER_KEY_traefik
        valueFrom:
          secretKeyRef:
            name: crowdsec
            key: BOUNCER_KEY_traefik
    secrets:
      csLapiSecret:
        valueFrom:
          secretKeyRef:
            name: crowdsec
            key: CS_LAPI_SECRET
      registrationToken:
        valueFrom:
          secretKeyRef:
            name: crowdsec
            key: registrationToken
  secrets:
    username:
      valueFrom:
        secretKeyRef:
          name: crowdsec
          key: USERNAME
    password:
      valueFrom:
        secretKeyRef:
          name: crowdsec
          key: PASSWORD
  config: 
    config.yaml.local: |
      api:
        server:
          auto_registration: 
            enabled: true
            token: "${REGISTRATION_TOKEN}"
            allowed_ranges:
              - "127.0.0.1/32"
              - "10.0.0.0/8"
      db_config:
        type: postgresql
        user: crowdsec
        password: "${DB_PASSWORD}"
        db_name: crowdsec
        host: postgresql.core-services.svc
        port: 5432
        sslmode: disable

webUi:
  image: ghcr.io/theduffman85/crowdsec-web-ui:2026.7.6
  namespace: core-services
  timezone: Europe/Bucharest
  host:
    subdomain: crowdsec
  secrets:
    domain:
      key: homeDomain
      path: kv/data/domains
  crowdsec:
    url: http://crowdsec-service:8080
    user: crowdsec-web-ui
    passwordKey: CROWDSEC_WEB_UI_PASSWORD
  storage:
    hostPath: /srv/appdata/core-services/crowdsec-web-ui
    size: 1Gi
  service:
    port: 3000
