# https://github.com/grafana/helm-charts/blob/main/charts/grafana/values.yaml
namespace: &namespace monitoring

host:
  subdomain: grafana

secrets:
  domain:
    key: homeDomain
    path: kv/data/domains

grafana:
  namespaceOverride: *namespace
  assertNoLeakedSecrets: false

  admin:
    existingSecret: grafana-vault
    userKey: adminUser
    passwordKey: adminPassword

  podAnnotations:
    reloader.stakater.com/auto: "true"

  envValueFrom:
    GF_SERVER_ROOT_URL:
      secretKeyRef:
        name: grafana-vault
        key: GF_SERVER_ROOT_URL
    GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
      secretKeyRef:
        name: grafana-vault
        key: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-vault
        key: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
    GF_AUTH_GENERIC_OAUTH_AUTH_URL:
      secretKeyRef:
        name: grafana-vault
        key: GF_AUTH_GENERIC_OAUTH_AUTH_URL
    GF_AUTH_GENERIC_OAUTH_TOKEN_URL:
      secretKeyRef:
        name: grafana-vault
        key: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
    GF_AUTH_GENERIC_OAUTH_API_URL:
      secretKeyRef:
        name: grafana-vault
        key: GF_AUTH_GENERIC_OAUTH_API_URL
    GF_AUTH_GENERIC_OAUTH_JWK_SET_URL:
      secretKeyRef:
        name: grafana-vault
        key: GF_AUTH_GENERIC_OAUTH_JWK_SET_URL
    GF_AUTH_GENERIC_OAUTH_SIGNOUT_REDIRECT_URL:
      secretKeyRef:
        name: grafana-vault
        key: GF_AUTH_GENERIC_OAUTH_SIGNOUT_REDIRECT_URL

  initChownData:
    enabled: false

  securityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472

  replicas: 1
  revisionHistoryLimit: 1

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

  service:
    type: ClusterIP
    port: 3000

  readinessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 30
    timeoutSeconds: 10
    failureThreshold: 5

  ingress:
    enabled: false

  persistence:
    enabled: true
    storageClassName: manual
    existingClaim: grafana

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
      - name: VictoriaMetrics
        type: prometheus
        url: http://victoria-metrics-server.monitoring.svc:8428
        access: proxy
        isDefault: true

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      # Node Exporter Full - https://grafana.com/grafana/dashboards/1860
      node-exporter-full:
        gnetId: 1860
        revision: 37
        datasource: VictoriaMetrics
      # kube-state-metrics v2 - https://grafana.com/grafana/dashboards/13332
      kube-state-metrics:
        gnetId: 13332
        revision: 12
        datasource: VictoriaMetrics
      # Kubernetes all-in-one - https://grafana.com/grafana/dashboards/14205
      kubernetes-all-in-one:
        gnetId: 14205
        revision: 1
        datasource: VictoriaMetrics

  grafana.ini:
    analytics:
      reporting_enabled: false
      check_for_updates: false
    server:
      root_url: "%(protocol)s://%(domain)s"
    auth.generic_oauth:
      enabled: true
      name: Authentik
      icon: signin
      allow_sign_up: true
      auto_login: false
      scopes: openid profile email offline_access
      use_pkce: true
      use_refresh_token: true
      validate_id_token: true
      groups_attribute_path: groups
      role_attribute_path: "contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'"
      role_attribute_strict: true
    users:
      auto_assign_org_role: Viewer

  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      label: grafana_dashboard
      labelValue: "1"
      skipReload: true
