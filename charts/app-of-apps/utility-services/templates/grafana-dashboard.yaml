{{- $applications := list (dict "name" "ChangeDetection.io" "selector" "changedetection(|-chrome)") (dict "name" "code-server" "selector" "code-server") (dict "name" "FlareSolverr" "selector" "flaresolverr") (dict "name" "Homepage" "selector" "homepage") (dict "name" "Mealie" "selector" "mealie") (dict "name" "Netronome" "selector" "netronome") (dict "name" "ntfy" "selector" "ntfy") (dict "name" "Paperless-AI" "selector" "paperless-ai") (dict "name" "Paperless-ngx" "selector" "paperless-ngx") (dict "name" "Restaurant Watcher" "selector" "restaurant-watcher") (dict "name" "Scrutiny" "selector" "scrutiny") (dict "name" "Stirling PDF" "selector" "stirling-pdf") (dict "name" "Vaultwarden" "selector" "vaultwarden") (dict "name" "Wiki.js" "selector" "wikijs") -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-utility-services
  namespace: {{ .Values.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  utility-services.json: |
    {
      "annotations": {"list": []},
      "description": "Static per-application CPU, memory, network and replica readiness for the {{ .Values.namespace }} namespace",
      "editable": true,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {{- range $index, $application := $applications }}
        {{- if $index }},{{ end }}
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": {{ mul $index 9 }}},
          "id": {{ add (mul $index 5) 1 }},
          "title": "{{ $application.name }}",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "fillOpacity": 10, "spanNulls": false},
              "min": 0,
              "unit": "cores"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 6, "x": 0, "y": {{ add (mul $index 9) 1 }}},
          "id": {{ add (mul $index 5) 2 }},
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "${datasource}"},
            "expr": "sum by (namespace, pod) (rate(container_cpu_usage_seconds_total{namespace=\"{{ $.Values.namespace }}\",container!=\"POD\",container!=\"\"}[2m])) and on (namespace, pod) (kube_pod_labels{namespace=\"{{ $.Values.namespace }}\",label_app_kubernetes_io_instance=\"{{ $application.selector }}\"} or kube_pod_labels{namespace=\"{{ $.Values.namespace }}\",label_app_kubernetes_io_name=~\"{{ $application.selector }}\"})",
            "legendFormat": "{{ "{{pod}}" }}",
            "refId": "A"
          }],
          "title": "CPU Usage",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "fillOpacity": 10, "spanNulls": false},
              "min": 0,
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 6, "x": 6, "y": {{ add (mul $index 9) 1 }}},
          "id": {{ add (mul $index 5) 3 }},
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "${datasource}"},
            "expr": "sum by (namespace, pod) (container_memory_working_set_bytes{namespace=\"{{ $.Values.namespace }}\",container!=\"POD\",container!=\"\"}) and on (namespace, pod) (kube_pod_labels{namespace=\"{{ $.Values.namespace }}\",label_app_kubernetes_io_instance=\"{{ $application.selector }}\"} or kube_pod_labels{namespace=\"{{ $.Values.namespace }}\",label_app_kubernetes_io_name=~\"{{ $application.selector }}\"})",
            "legendFormat": "{{ "{{pod}}" }}",
            "refId": "A"
          }],
          "title": "Memory Usage",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "fillOpacity": 5, "spanNulls": false},
              "min": 0,
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 6, "x": 12, "y": {{ add (mul $index 9) 1 }}},
          "id": {{ add (mul $index 5) 4 }},
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum by (namespace, pod) (rate(container_network_receive_bytes_total{namespace=\"{{ $.Values.namespace }}\"}[2m])) and on (namespace, pod) (kube_pod_labels{namespace=\"{{ $.Values.namespace }}\",label_app_kubernetes_io_instance=\"{{ $application.selector }}\"} or kube_pod_labels{namespace=\"{{ $.Values.namespace }}\",label_app_kubernetes_io_name=~\"{{ $application.selector }}\"})",
              "legendFormat": "{{ "{{pod}}" }} RX",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum by (namespace, pod) (rate(container_network_transmit_bytes_total{namespace=\"{{ $.Values.namespace }}\"}[2m])) and on (namespace, pod) (kube_pod_labels{namespace=\"{{ $.Values.namespace }}\",label_app_kubernetes_io_instance=\"{{ $application.selector }}\"} or kube_pod_labels{namespace=\"{{ $.Values.namespace }}\",label_app_kubernetes_io_name=~\"{{ $application.selector }}\"})",
              "legendFormat": "{{ "{{pod}}" }} TX",
              "refId": "B"
            }
          ],
          "title": "Network",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "custom": {"lineWidth": 2, "fillOpacity": 10, "spanNulls": false},
              "mappings": [{
                "options": {
                  "0": {"color": "red", "index": 0, "text": "Not Ready"},
                  "1": {"color": "green", "index": 1, "text": "Ready"}
                },
                "type": "value"
              }],
              "max": 1,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 6, "x": 18, "y": {{ add (mul $index 9) 1 }}},
          "id": {{ add (mul $index 5) 5 }},
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "${datasource}"},
            "expr": "max by (namespace, pod) (kube_pod_status_ready{namespace=\"{{ $.Values.namespace }}\",condition=\"true\"} and on (namespace, pod) (kube_pod_labels{namespace=\"{{ $.Values.namespace }}\",label_app_kubernetes_io_instance=\"{{ $application.selector }}\"} or kube_pod_labels{namespace=\"{{ $.Values.namespace }}\",label_app_kubernetes_io_name=~\"{{ $application.selector }}\"}))",
            "legendFormat": "{{ "{{pod}}" }}",
            "refId": "A"
          }],
          "title": "Replica Readiness",
          "type": "timeseries"
        }
        {{- end }}
      ],
      "schemaVersion": 38,
      "tags": ["utility-services", "kubernetes"],
      "templating": {
        "list": [{
          "current": {},
          "hide": 0,
          "includeAll": false,
          "multi": false,
          "name": "datasource",
          "options": [],
          "query": "prometheus",
          "refresh": 1,
          "type": "datasource"
        }]
      },
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Utility Services",
      "uid": "utility-services",
      "version": 1
    }
