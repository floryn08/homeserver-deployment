{{- $namespaces := list "ai-services" "core-services" "game-servers" "home-automation" "media-management" "monitoring" "utility-services" -}}
{{- $namespaceRegex := join "|" $namespaces -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-namespace-overview
  namespace: {{ .Values.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  namespace-overview.json: |
    {
      "annotations": {"list": []},
      "description": "Health summary and resource comparison for app-of-apps namespaces",
      "editable": true,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "title": "Current Health",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "decimals": 0,
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 4, "x": 0, "y": 1},
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "${datasource}"},
            "expr": "sum(kube_pod_status_ready{namespace=~\"{{ $namespaceRegex }}\",condition=\"true\"} and on (namespace, pod) (kube_pod_status_phase{namespace=~\"{{ $namespaceRegex }}\",phase=~\"Pending|Running|Unknown\"} == 1)) or vector(0)",
            "legendFormat": "Ready",
            "refId": "A"
          }],
          "title": "Ready Pods",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 4, "x": 4, "y": 1},
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "${datasource}"},
            "expr": "(count(kube_pod_info{namespace=~\"{{ $namespaceRegex }}\"} and on (namespace, pod) (kube_pod_status_phase{namespace=~\"{{ $namespaceRegex }}\",phase=~\"Pending|Running|Unknown\"} == 1)) - sum(kube_pod_status_ready{namespace=~\"{{ $namespaceRegex }}\",condition=\"true\"} and on (namespace, pod) (kube_pod_status_phase{namespace=~\"{{ $namespaceRegex }}\",phase=~\"Pending|Running|Unknown\"} == 1))) or vector(0)",
            "legendFormat": "Not Ready",
            "refId": "A"
          }],
          "title": "Not Ready Pods",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "red", "value": 10}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 4, "x": 8, "y": 1},
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "${datasource}"},
            "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=~\"{{ $namespaceRegex }}\"}[1h])) or vector(0)",
            "legendFormat": "Restarts",
            "refId": "A"
          }],
          "title": "Container Restarts (1h)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "decimals": 2,
              "min": 0,
              "unit": "cores"
            },
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 4, "x": 12, "y": 1},
          "id": 5,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "${datasource}"},
            "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=~\"{{ $namespaceRegex }}\",container!=\"POD\",container!=\"\"}[2m]))",
            "legendFormat": "CPU",
            "refId": "A"
          }],
          "title": "CPU Usage",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "min": 0,
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 4, "x": 16, "y": 1},
          "id": 6,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "${datasource}"},
            "expr": "sum(container_memory_working_set_bytes{namespace=~\"{{ $namespaceRegex }}\",container!=\"POD\",container!=\"\"})",
            "legendFormat": "Memory",
            "refId": "A"
          }],
          "title": "Memory Usage",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "min": 0,
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 4, "x": 20, "y": 1},
          "id": 7,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(container_network_receive_bytes_total{namespace=~\"{{ $namespaceRegex }}\"}[2m]))",
              "legendFormat": "RX",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(container_network_transmit_bytes_total{namespace=~\"{{ $namespaceRegex }}\"}[2m]))",
              "legendFormat": "TX",
              "refId": "B"
            }
          ],
          "title": "Network Throughput",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 7},
          "id": 10,
          "title": "Namespaces Over Time",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "fillOpacity": 10, "spanNulls": false},
              "links": [{
                "targetBlank": false,
                "title": "Open namespace dashboard",
                "url": "/d/${__field.labels.namespace}/${__field.labels.namespace}?${__url_time_range}"
              }],
              "min": 0,
              "unit": "cores"
            },
            "overrides": []
          },
          "gridPos": {"h": 9, "w": 6, "x": 0, "y": 8},
          "id": 11,
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "${datasource}"},
            "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{namespace=~\"{{ $namespaceRegex }}\",container!=\"POD\",container!=\"\"}[2m]))",
            "legendFormat": "{{ "{{namespace}}" }}",
            "refId": "A"
          }],
          "title": "CPU by Namespace",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "fillOpacity": 10, "spanNulls": false},
              "links": [{
                "targetBlank": false,
                "title": "Open namespace dashboard",
                "url": "/d/${__field.labels.namespace}/${__field.labels.namespace}?${__url_time_range}"
              }],
              "min": 0,
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {"h": 9, "w": 6, "x": 6, "y": 8},
          "id": 12,
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "${datasource}"},
            "expr": "sum by (namespace) (container_memory_working_set_bytes{namespace=~\"{{ $namespaceRegex }}\",container!=\"POD\",container!=\"\"})",
            "legendFormat": "{{ "{{namespace}}" }}",
            "refId": "A"
          }],
          "title": "Memory by Namespace",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "fillOpacity": 5, "spanNulls": false},
              "links": [{
                "targetBlank": false,
                "title": "Open namespace dashboard",
                "url": "/d/${__field.labels.namespace}/${__field.labels.namespace}?${__url_time_range}"
              }],
              "min": 0,
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": {"h": 9, "w": 6, "x": 12, "y": 8},
          "id": 13,
          "options": {
            "legend": {"displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum by (namespace) (rate(container_network_receive_bytes_total{namespace=~\"{{ $namespaceRegex }}\"}[2m]))",
              "legendFormat": "{{ "{{namespace}}" }} RX",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum by (namespace) (rate(container_network_transmit_bytes_total{namespace=~\"{{ $namespaceRegex }}\"}[2m]))",
              "legendFormat": "{{ "{{namespace}}" }} TX",
              "refId": "B"
            }
          ],
          "title": "Network by Namespace",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "custom": {"lineWidth": 2, "fillOpacity": 10, "spanNulls": false},
              "links": [{
                "targetBlank": false,
                "title": "Open namespace dashboard",
                "url": "/d/${__field.labels.namespace}/${__field.labels.namespace}?${__url_time_range}"
              }],
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 90},
                  {"color": "green", "value": 100}
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 9, "w": 6, "x": 18, "y": 8},
          "id": 14,
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "${datasource}"},
            "expr": "100 * sum by (namespace) (kube_pod_status_ready{namespace=~\"{{ $namespaceRegex }}\",condition=\"true\"} and on (namespace, pod) (kube_pod_status_phase{namespace=~\"{{ $namespaceRegex }}\",phase=~\"Pending|Running|Unknown\"} == 1)) / count by (namespace) (kube_pod_info{namespace=~\"{{ $namespaceRegex }}\"} and on (namespace, pod) (kube_pod_status_phase{namespace=~\"{{ $namespaceRegex }}\",phase=~\"Pending|Running|Unknown\"} == 1))",
            "legendFormat": "{{ "{{namespace}}" }}",
            "refId": "A"
          }],
          "title": "Pod Readiness by Namespace",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 17},
          "id": 20,
          "title": "Recent Restarts",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "cellOptions": {"type": "auto"},
                "inspect": false
              }
            },
            "overrides": [{
              "matcher": {"id": "byName", "options": "Restarts"},
              "properties": [
                {"id": "decimals", "value": 0},
                {
                  "id": "thresholds",
                  "value": {
                    "mode": "absolute",
                    "steps": [
                      {"color": "green", "value": null},
                      {"color": "yellow", "value": 1},
                      {"color": "red", "value": 10}
                    ]
                  }
                },
                {"id": "custom.cellOptions", "value": {"type": "color-background"}}
              ]
            }]
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 18},
          "id": 21,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "countRows": false,
              "fields": "",
              "reducer": ["sum"],
              "show": false
            },
            "showHeader": true,
            "sortBy": [{"desc": true, "displayName": "Restarts"}]
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "${datasource}"},
            "expr": "sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{namespace=~\"{{ $namespaceRegex }}\"}[1h])) > 0",
            "format": "table",
            "instant": true,
            "refId": "A"
          }],
          "title": "Pods Restarted in the Last Hour",
          "transformations": [{
            "id": "organize",
            "options": {
              "excludeByName": {"Time": true},
              "indexByName": {"namespace": 0, "pod": 1, "Value": 2},
              "renameByName": {
                "Value": "Restarts",
                "namespace": "Namespace",
                "pod": "Pod"
              }
            }
          }],
          "type": "table"
        }
      ],
      "schemaVersion": 38,
      "tags": ["overview", "kubernetes"],
      "templating": {
        "list": [{
          "current": {},
          "hide": 0,
          "includeAll": false,
          "multi": false,
          "name": "datasource",
          "options": [],
          "query": "prometheus",
          "refresh": 1,
          "type": "datasource"
        }]
      },
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Namespace Overview",
      "uid": "namespace-overview",
      "version": 1
    }
